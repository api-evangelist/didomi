            type: string
        legitimate_interest_purposes_id:
          type: array
          description: Purposes of the partner with legitimate interest legal basis
          items:
            type: string
        spi_purposes_id:
          type: array
          description: Purposes of the partner with sensitive personal information
          items:
            type: string
