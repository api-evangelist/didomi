          content:
            application/json:
              schema:
                $ref: '#/components/schemas/partners-purposes'
        '401':
          description: not authenticated
        '404':
          description: not found
        '500':
          description: general error
      description: Updates the resource identified by id using data.
      summary: ''
      tags:
      - metadata
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/partners-purposes'
    patch:
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/partners-purposes'
      description: Updates only the processing rules for an existing partner-purpose association
      summary: Update processing rules
      tags:
      - metadata
      security:
      - bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                processing_rules:
                  type: array
                  items:
                    type: string
                    enum:
                    - opt-in
                    - opt-out
                  minItems: 1
              required:
              - processing_rules
    delete:
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Association successfully deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ID of the deleted association
      description: Permanently removes a partner-purpose association
      summary: Delete a partner-purpose association
      tags:
      - metadata
      security:
      - bearer: []
