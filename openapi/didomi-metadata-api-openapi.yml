          content:
            application/json:
              schema:
                $ref: '#/components/schemas/partners-purposes'
      description: Retrieves a single partner-purpose association by ID
      summary: Get a partner-purpose association
      tags:
      - metadata
      security:
      - bearer: []
    put:
      parameters:
      - in: path
        name: id
        description: ID of partners-purposes to update
        schema:
