        url: https://developers.didomi.io/cmp/web-sdk/reference/events
      - type: Versioning
        url: https://developers.didomi.io/cmp/web-sdk/reference/versions
      - type: Performance
        url: https://developers.didomi.io/cmp/web-sdk/performance
    description: >-
      The Didomi Web SDK is the browser-side library that renders consent notices, preference centers, and privacy
      widgets, gates third-party tags on user consent, and writes IAB TCF v2 / GPP / Didomi consent strings to storage.
      It exposes a programmatic API (Didomi.getUserConsentStatus, Didomi.setUserAgreeToAll, Didomi.openPreferences,
      etc.), a typed event bus, and integrations with Google Tag Manager, Adobe Launch, Tealium, Prebid, Google Consent
      Mode v2, Salesforce DMP, Piano Analytics and other tag managers and SSPs.
