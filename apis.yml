      Didomi maintains first-party CMP plugins for React Native, Flutter, Unity (games and game consoles), Vega OS (LG
      webOS smart TVs), and Google AMP. Each wraps the platform's notice rendering, consent storage, event bus, and
      consent-string generation so cross-platform teams ship one consent UX across browser, native mobile, CTV, in-game,
      and AMP surfaces.
