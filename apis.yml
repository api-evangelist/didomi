aid: didomi
url: https://raw.githubusercontent.com/api-evangelist/didomi/refs/heads/main/apis.yml
name: Didomi
description: >-
  Didomi is a Paris-based consent and preference management platform (CMP/PMP) that helps publishers, advertisers,
  retailers, and large enterprises collect, manage, and act on user privacy choices across web, mobile, CTV, and AMP
  surfaces. The platform covers GDPR, CCPA and the wider US state-law landscape, IAB TCF v2.x, Google Consent Mode v2,
  the IAB GPP, GPC, the EU DMA, Chilean Law 25, Australian privacy law, and other regulations through a single
  multi-regulation configuration model. Didomi exposes a JSON REST API (https://api.didomi.io/v1/) plus first-party SDKs
  for Web, iOS/tvOS, Android/Android TV, Unity, React Native, Flutter, Vega OS, and AMP, alongside IAB-compliant consent
  string tooling and reverse-proxy boilerplates for Fastly, CloudFront, and Cloudflare.
tags:
  - Advertising
  - AdTech
  - CCPA
  - CMP
  - Consent
  - Consent Management
  - DSAR
  - Data Privacy
  - GDPR
  - IAB TCF
  - MarTech
  - Preference Management
  - Privacy
  - Privacy Requests
  - Regulatory Compliance
