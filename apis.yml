  - type: Features
    data:
      - name: Multi-regulation CMP
        description: >-
          One Didomi notice can target GDPR, CCPA and the wider US-state landscape, TCF v2.x, GPP, GPC, EU DMA, Chilean
          Law 25, Australian privacy law, and Nordic regimes from a single multi-regulation configuration.
      - name: IAB TCF v2.x / GPP / GPC compliance
        description: >-
          Didomi is an IAB-registered CMP that emits, validates, and decodes TCF v2.x and IAB GPP consent strings and
          honors Global Privacy Control signals.
      - name: Google Consent Mode v2
        description: >-
          Native, certified Google Consent Mode v2 integration on Web and Mobile, plus Amazon Consent Signal and
          Microsoft UET Consent Mode bridges.
      - name: Preference Management Platform (PMP)
        description: >-
          A separately licensed Preference Management module exposing custom preference centers, headless preference
          widgets, marketing channel preferences, and email/SMS opt-in flows.
      - name: Privacy Requests Management
        description: >-
          DSAR / privacy-request intake forms, internal workflow, evidence storage, and reporting for GDPR Articles
          15-22 and CCPA opt-out / delete rights.
      - name: Compliance Monitoring & Reports
        description: >-
          Automated scanning of websites and apps for vendor coverage, unauthorized tags, and CMP behavior; CSV / Excel
          compliance reports surfaced via the Platform API and Console.
      - name: Privacy Widgets
        description: >-
          Configurable, themed widgets (preference centers, DSAR forms, headless React widgets, embeddable widgets)
          deployable on Didomi-managed or customer-owned domains.
      - name: Consent Notice on Custom Domain
        description: >-
          Serve consent notices from the customer's own domain via DNS delegation or via reverse-proxy boilerplates for
          Fastly, AWS CloudFront, and Cloudflare.
      - name: Cross-device / cross-domain consent sharing
        description: >-
          Authenticated users can carry their consent state across domains and across devices via the platform's tokens
          and links APIs.
      - name: Server-side Google Tag Manager (Addingwell)
        description: >-
          Server-side tagging product (Addingwell, acquired by Didomi) integrated with the consent model for first-party
          tagging without browser-side third-party calls.
      - name: Cross-Platform SDKs
        description: >-
          First-party SDKs for Web, iOS / tvOS / Mac Catalyst, Android / Android TV, React Native, Flutter, Unity, Vega
          OS (LG smart TVs), and Google AMP.
      - name: Open Consent String tooling
        description: >-
          Open-source consent-string encoders / decoders in TypeScript, Rust (with C and Java FFI), and Go, plus the
          iabtcf-es TCF v2 toolkit fork.
      - name: JWT bearer authentication
        description: >-
          Platform API uses short-lived (one-hour) JWT access tokens obtained by exchanging API key + secret against
          POST /v1/sessions.
      - name: Token-bucket rate limiting
        description: >-
          100 requests per 15 seconds per organization across most routes, with the high-volume /consents/* family
          exempt; RateLimit / RateLimit-Policy headers and 429 + Retry-After when exceeded.
      - name: SSO and member management
        description: >-
          Programmatic management of organization members, roles, SSO connections, partner-portal sessions, and per-key
          API quotas via the Platform API.
    sources:
      - https://www.didomi.io
      - https://developers.didomi.io/api-and-platform/introduction
      - https://api.didomi.io/openapi.json
      - https://status.didomi.io
  - type: UseCases
    data:
      - name: Publisher CMP for ad monetization
        description: >-
          News publishers and media groups (Yahoo, large French / European publishers) use Didomi as their IAB TCF CMP
          so SSPs and DSPs receive valid consent signals and ad inventory is monetizable under GDPR.
      - name: Retailer / e-commerce consent and preference
        description: >-
          Retail and e-commerce brands (Lacoste, Rakuten, Michelin) capture consent for analytics, personalization,
          marketing, and CRM channels via the CMP and Preference Management Platform.
      - name: Connected TV CMP
        description: >-
          CTV apps on LG webOS / Vega OS, Android TV, and tvOS use Didomi's native SDKs to render consent on TV screens
          and emit the same TCF / Didomi consent strings used on web.
      - name: DSAR / privacy-request intake at scale
        description: >-
          Enterprises route GDPR Article 15-22 and CCPA opt-out / delete requests through Didomi's Privacy Requests
          product, with audit-grade proofs and structured exports.
      - name: Cross-domain / cross-device consent for media groups
        description: >-
          Media groups operating dozens of domains share a single consent across all properties and across user devices
          via consent tokens and links.
      - name: Server-side first-party tagging
        description: >-
          Marketing teams replace browser-side third-party tags with server-side Google Tag Manager via Addingwell,
          gated on Didomi consent.
    sources:
      - https://www.didomi.io
  - type: Integrations
    data:
      - name: Google Tag Manager
        description: First-class Didomi GTM template and native integration; certified Google Consent Mode v2 signal delivery.
      - name: Google Ad Manager / AdSense / AdX
        description: Pass TCF consent signal and non-personalized-ads (NPA) fallback to Google ad stack.
      - name: Adobe Launch / Adobe DTM
        description: Documented integration patterns for managing tag firing under Didomi consent.
      - name: Tealium iQ
        description: Native Tealium integration for tag governance under Didomi consent.
      - name: Eulerian
        description: Tag firing control through Eulerian tag management.
      - name: Prebid
        description: Pass TCF v2 / US state-law consent to Prebid header bidding wrappers.
      - name: Salesforce DMP (Krux)
        description: Forward consent state to Salesforce DMP / Krux.
      - name: Piano Analytics (AT Internet)
        description: Integration with Piano Analytics (formerly AT Internet) for consent-aware analytics.
      - name: Kameleoon
        description: Consent integration with Kameleoon experimentation / personalization platform.
      - name: Simple Analytics
        description: Privacy-friendly analytics integration.
      - name: Amazon Consent Signal
        description: Native bridge to Amazon's consent signal for Amazon Publisher Services.
      - name: Microsoft UET Consent Mode
        description: Native bridge to Microsoft UET / Bing Ads consent mode.
      - name: mParticle
        description: First-party JavaScript kit integration for mParticle customer data platform.
      - name: Magento 2
        description: Didomi Magento 2 extension for consent management on Magento storefronts.
      - name: Firebase
        description: Cloud Functions integration to ship Didomi consent into the Firebase / Google ecosystem.
      - name: Postman
        description: Public Postman workspace and collections for the Platform API.
    sources:
      - https://github.com/didomi
      - https://www.didomi.io
  - type: Solutions
    data:
      - name: CMP for Publishers
        description: IAB TCF v2.x CMP specialized for ad-funded publishers and media groups.
      - name: CMP for Advertisers and Brands
        description: Consent capture and forwarding for advertiser stacks, MarTech tools, and CDPs.
      - name: CMP for Connected TV
        description: Native CTV consent for Vega OS, Android TV, tvOS, and other TV runtimes.
      - name: CMP for Mobile Apps
        description: iOS / Android / cross-platform consent management coordinated with ATT and Google Consent Mode v2.
      - name: Preference Management Platform
        description: Marketing-preference and channel-opt-in management beyond regulatory consent.
      - name: Privacy Requests
        description: GDPR / CCPA DSAR intake, internal workflow, and audit-grade evidence.
      - name: Compliance Monitoring
        description: Continuous scanning of digital properties for vendor coverage, unauthorized tags, and CMP misconfigurations.
      - name: Addingwell - Server-side Tagging
        description: Server-side Google Tag Manager product acquired by Didomi, integrated with the Didomi consent model.
    sources:
      - https://www.didomi.io
