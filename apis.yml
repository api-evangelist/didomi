    description: >-
      The Didomi Platform REST API at https://api.didomi.io/v1/ is the machine-facing surface for the entire Didomi
      CMP/PMP. It exposes 80+ operations across consents events / proofs / tokens / users, widgets (notices, configs,
      deployments, SDK configs, templates), data manager metadata (vendors, purposes, partners, taxonomies,
      regulations), and administration (organizations, members, keys, secrets, domains, SSO connections, premium
      features). Authentication is JWT bearer — clients POST API key + secret to /v1/sessions and reuse the returned
      access_token for one hour. Default rate limit is 100 requests per 15 seconds per organization (the /consents/*
      high-volume routes are exempt). Standard JSON request / response, cursor and offset pagination, structured error
      envelope.
  - aid: didomi:didomi-web-sdk
    name: Didomi Web SDK
    tags:
      - Consent
      - JavaScript
      - SDK
      - Web
    humanURL: https://developers.didomi.io/cmp/web-sdk
    properties:
      - type: Documentation
        url: https://developers.didomi.io/cmp/web-sdk
      - type: GettingStarted
        url: https://developers.didomi.io/cmp/web-sdk/getting-started
      - type: APIReference
        url: https://developers.didomi.io/cmp/web-sdk/reference/api
