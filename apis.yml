    description: >-
      Open-source libraries published under github.com/didomi for encoding, decoding, and validating the Didomi consent
      string and the IAB TCF v2 consent string. Includes TypeScript (`consent-string`, `consent-string-schema`), Rust
      with C/Java FFI (`consent-string-decoder-rust`), Go (`consent-string-golang`), and a fork of the official IAB
      tooling (`iabtcf-es`). Useful for server-side auditing, downstream ad-tech reading consent state, and offline
      analysis.
