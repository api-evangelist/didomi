      The iOS / tvOS / Mac Catalyst SDK renders Didomi consent notices and preference centers natively in Swift and
      Objective-C apps, coordinates Apple's App Tracking Transparency (ATT) prompt with consent, shares consent with
      WebViews, and emits TCF / GPP / Didomi consent strings. Distributed via Swift Package Manager
      (github.com/didomi/didomi-ios-sdk-spm) and CocoaPods.
