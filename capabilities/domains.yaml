          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: object
          required: false
          description: Optional query filters / pagination.
      - name: post-domains
        method: POST
        description: Create a domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body (JSON).
