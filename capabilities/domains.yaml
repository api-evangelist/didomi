        name: get-domains-id
        description: Retrieve a domain
        call: domains.get-domains-id
      - method: PUT
        name: put-domains-id
        description: Update a domain
        call: domains.put-domains-id
      - method: PATCH
        name: patch-domains-id
        description: Patch a domain
        call: domains.patch-domains-id
      - method: DELETE
