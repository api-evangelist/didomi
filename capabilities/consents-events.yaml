    resources:
    - name: consents-events
      path: /consents/events
      operations:
      - name: get-consents-events
        method: GET
        description: Retrieve events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: object
          required: false
          description: Optional query filters / pagination.
      - name: post-consents-events
        method: POST
        description: Create a new event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body (JSON).
      - name: delete-consents-events
        method: DELETE
        description: Delete events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: consents-events-id
      path: /consents/events/{id}
      operations:
      - name: get-consents-events-id
        method: GET
        description: Retrieve an event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: patch-consents-events-id
        method: PATCH
        description: Patch an event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
          description: Request body (JSON).
      - name: delete-consents-events-id
        method: DELETE
        description: Delete an event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      value: '{{env.DIDOMI_BEARER_TOKEN}}'
      placement: header
      note: Obtain by POSTing api-key + secret to /v1/sessions and reusing access_token for up to one hour.
  exposes:
  - type: rest
    namespace: consents-events-rest
    port: 8080
    description: REST adapter for Didomi Platform API — Consents Events. One resource per consumed operation.
    resources:
